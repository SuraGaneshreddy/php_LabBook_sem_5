<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Screen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{width:350px;background:#fff;padding:35px;border-radius:15px;box-shadow:0 15px 35px rgba(0,0,0,.2)}
h2{text-align:center;margin-bottom:25px;color:#333}
.input-group{margin-bottom:18px}
label{display:block;margin-bottom:6px;font-weight:bold;color:#555}
input{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:15px;outline:none}
input:focus{border-color:#4facfe}
.password-box{display:flex}
.password-box input{border-radius:8px 0 0 8px}
.password-box button{width:70px;border:none;background:#4facfe;color:#fff;cursor:pointer;border-radius:0 8px 8px 0}
button[type=submit]{width:100%;padding:12px;margin-top:10px;background:#4facfe;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
button[type=submit]:hover{background:#2196f3}
.message{margin-top:15px;text-align:center;font-weight:bold}
.footer{margin-top:20px;text-align:center;font-size:14px;color:#666}
</style>
</head>
<body>
<div class="container">
<h2>Login</h2>
<form id="loginForm">
<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter Username">
</div>
<div class="input-group">
<label>Password</label>
<div class="password-box">
<input type="password" id="password" placeholder="Enter Password">
<button type="button" onclick="togglePassword()">Show</button>
</div>
</div>
<button type="submit">Login</button>
<p class="message" id="message"></p>
</form>
<div class="footer">Project using HTML5, CSS3 &amp; JavaScript</div>
</div>
<script>
function togglePassword(){
 const p=document.getElementById("password");
 p.type=(p.type==="password")?"text":"password";
}
document.getElementById("loginForm").addEventListener("submit",function(e){
 e.preventDefault();
 const u=document.getElementById("username").value.trim();
 const p=document.getElementById("password").value.trim();
 const m=document.getElementById("message");
 if(!u||!p){m.style.color="red";m.textContent="Please fill all fields.";return;}
 if(u==="admin"&&p==="12345"){m.style.color="green";m.textContent="Login Successful!";}
 else{m.style.color="red";m.textContent="Invalid Username or Password.";}
});
</script>
</body>
</html>
